services:
  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  order-db:
    image: postgres:17-alpine
    container_name: order-db
    environment:
      POSTGRES_USER: order
      POSTGRES_PASSWORD: password  # pragma: allowlist secret
      POSTGRES_DB: order
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./services/order/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order -d order"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-service:
    build: ./services/order
    container_name: order-service
    depends_on:
      kafka:
        condition: service_healthy
      order-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://order:password@order-db:5432/order  # pragma: allowlist secret
      KAFKA_BROKERS: kafka:9092
      KAFKA_REQUEST_TOPIC: inventory.reservation.requests
      KAFKA_RESULT_TOPIC: inventory.reservation.results
      KAFKA_CONSUMER_GROUP: order-service
    ports:
      - "8081:8080"

volumes:
  kafka-data:
  order-db-data:
