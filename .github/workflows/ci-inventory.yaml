name: CI - Inventory Service

on:
  push:
    branches: [main]
    paths:
      - "services/**/*.go"
      - "services/**/go.mod"
      - "services/**/go.sum"
      - ".github/workflows/ci-inventory.yml"
  pull_request:
    paths:
      - "services/**/*.go"
      - "services/**/go.mod"
      - "services/**/go.sum"
      - ".github/workflows/ci-inventory.yml"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      inventory: ${{ steps.filter.outputs.inventory }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            inventory:
              - "services/inventory/**"

  test-inventory:
    needs: detect-changes
    if: needs.detect-changes.outputs.inventory == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/inventory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/inventory/go.mod
          cache-dependency-path: services/inventory/go.sum
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test ./...
