name: CI - Order Service

on:
  push:
    branches: [main]
    paths:
      - "services/order/**"
      - ".github/workflows/ci-order.yaml"
  pull_request:
    paths:
      - "services/order/**"
      - ".github/workflows/ci-order.yaml"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      order: ${{ steps.filter.outputs.order }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            order:
              - "services/order/**"

  test-order:
    needs: detect-changes
    if: needs.detect-changes.outputs.order == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/order
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest
