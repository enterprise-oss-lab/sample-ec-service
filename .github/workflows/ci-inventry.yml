name: CI - Inventory Service

on:
  push:
    branches: [main]
    paths:
      - "services/**/*.go"
      - "services/**/go.mod"
      - "services/**/go.sum"
      - ".github/workflows/ci-inventory.yml"
  pull_request:
    paths:
      - "services/**/*.go"
      - "services/**/go.mod"
      - "services/**/go.sum"
      - ".github/workflows/ci-inventory.yml"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            inventory:
              - "services/inventory/**"
